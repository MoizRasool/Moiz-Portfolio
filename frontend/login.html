<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | Syed Moiz Rasool</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ffd5;
            --bg-dark: #020205; /* Extra Dark for Space */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            /* Background changed to a deep cosmic nebula feel */
            background: radial-gradient(circle at center, #051622 0%, #000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* Moving Nebula Effect */
        .nebula {
            position: fixed;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(0, 255, 213, 0.03) 0%, transparent 70%);
            z-index: 1;
            filter: blur(100px);
            animation: moveNebula 15s ease-in-out infinite alternate;
        }

        @keyframes moveNebula {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* --- Login Card --- */
        .login-card {
            background: rgba(5, 5, 5, 0.7);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(25px);
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 10;
            animation: zoomEntrance 1s ease-out, float 5s ease-in-out infinite;
        }

        @keyframes zoomEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo { font-size: 2rem; font-weight: 800; color: white; margin-bottom: 10px; }
        .logo span { color: var(--primary); }

        .welcome-text { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 35px; opacity: 0.7; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 0.9rem; }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 255, 213, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 213, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 213, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--primary); }

    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="nebula"></div>

    <div class="login-card">
        <div class="logo">MOIZ<span>.</span></div>
        <h2 style="color: white; font-weight: 700; font-size: 1.5rem;">Welcome Back</h2>
        <p class="welcome-text">Please enter your details to login</p>
        
        <form action="#">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Username or Email" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Portfolio</a>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2 + 0.1;
                this.speedX = Math.random() * 0.1 - 0.05;
                this.speedY = Math.random() * 0.1 - 0.05;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.4 + 0.2})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 200; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init(); animate();
    </script>
</body>
</html>
